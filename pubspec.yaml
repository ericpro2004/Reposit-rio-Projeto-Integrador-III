name: buscaqui
description: "BusCaqui — gestão, chamada e monitoramento de transporte escolar."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1

  # Backend / Auth / Realtime / Storage
  supabase_flutter: ^2.5.6

  # Navegação
  go_router: ^14.2.0

  # Mapas e tracking
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Notificações Push
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0

  # Dashboard / gráficos
  fl_chart: ^0.68.0

  # Utilidades
  share_plus: ^9.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
